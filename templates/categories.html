{% extends 'base.html' %}

{% block content %}
    <div class="flex-header">
        <h1>Categories</h1>
    </div>

    <section class="content-section">
        <h2>Add Category</h2>
        <form method="post">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" name="description">
            </div>
            <button type="submit" class="btn">Add Category</button>
        </form>
    </section>

    <section class="content-section">
        <h2>All Categories</h2>
        <div class="overflow-auto">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for category in categories %}
                    <tr>
                        <td>{{ category.id }}</td>
                        <td>{{ category.name }}</td>
                        <td>{{ category.description }}</td>
                        <td>{{ category.created_at }}</td>
                        <td class="actions">
                            <a href="{{ url_for('categories.edit_category', id=category.id) }}" class="btn btn-small">Edit</a>
                            <form action="{{ url_for('categories.delete_category', id=category.id) }}" method="post" class="inline-form">
                                <button type="submit" class="btn btn-small btn-danger" onclick="return confirm('Are you sure?');">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>
{% endblock %}
