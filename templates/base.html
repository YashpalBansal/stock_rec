<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="nav-inner">
            <a href="{{ url_for('dashboard.index') }}" class="logo">📦 Smart Inventory</a>
            <nav>
                <ul>
                    <li><a href="{{ url_for('dashboard.index') }}">Dashboard</a></li>
                    <li><a href="{{ url_for('categories.categories') }}">Categories</a></li>
                    <li><a href="{{ url_for('items.items') }}">Items</a></li>
                    <li><a href="{{ url_for('purchases.purchases') }}">Purchases</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flashes">
                    {% for message in messages %}
                        <li class="flash">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
