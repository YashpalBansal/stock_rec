{% extends 'base.html' %}

{% block content %}
    <h1>Items</h1>

    <form method="post">
        <h3>Add Item</h3>
        <label>Name</label>
        <input type="text" name="name" required>
        <label>Category</label>
        <select name="category_id" required>
            {% for category in categories %}
            <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
        </select>
        <label>Unit (e.g., kg, liters, pcs)</label>
        <input type="text" name="unit" required>
        <label>Current Stock</label>
        <input type="number" step="0.01" name="current_stock" required>
        <button type="submit">Add Item</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Unit</th>
            <th>Current Stock</th>
            <th>Created At</th>
        </tr>
        {% for item in items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.category_name }}</td>
            <td>{{ item.unit }}</td>
            <td>{{ item.current_stock }}</td>
            <td>{{ item.created_at }}</td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
