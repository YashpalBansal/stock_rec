{% extends 'base.html' %}

{% block content %}
    <h1>Edit Item</h1>

    <form method="post">
        <label>Name</label>
        <input type="text" name="name" value="{{ item.name }}" required>
        <label>Category</label>
        <select name="category_id" required>
            {% for category in categories %}
            <option value="{{ category.id }}" {% if category.id == item.category_id %}selected{% endif %}>{{ category.name }}</option>
            {% endfor %}
        </select>
        <label>Unit</label>
        <input type="text" name="unit" value="{{ item.unit }}" required>
        <label>Current Stock</label>
        <input type="number" step="0.01" name="current_stock" value="{{ item.current_stock }}" required>
        <button type="submit">Update Item</button>
    </form>
{% endblock %}
